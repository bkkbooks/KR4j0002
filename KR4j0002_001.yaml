畔且尋思鸚鵡前頭休借問驚鴻過後生離恨紅日長時添酒困未知心在阿誰邊滿眼淚珠言不盡又沉沉庭院鶯吟弄日暖煙和春氣重緑楊嬌眼為誰回芳草深心空自動倚闌無語傷離鳯一片風情無處用尋思還有舊家心蝴蝶時時來役夢又去時梅蕚初凝粉不覺小桃風力損梨花最晚又凋零何事歸期無定準闌干倚遍重來憑淚粉偷將紅袖印蜘蛛喜鵲誤人多似此無憑安足信又酒美春濃花世界得意人人千萬態莫教辜負豔陽天過了堆金何處買巳去少年無計奈且願芳心長恁在間愁一點上心來算得東風吹不解又湖邊栁外樓高處望斷雲山多少路闌干倚遍使人愁又是天涯初日暮輕無管繫狂無數水畔花飛風裏絮算伊渾似薄情郎去便不來來便去又南園粉蝶能無數度翠穿紅來復去倡條冶葉恣留連飄蕩輕于花上絮朱闌夜夜風兼露宿粉棲香無定所多情翻却似無情贏得百花無限妬又子規江南三月春光老月落禽啼天未曉露和啼血染花紅恨過千家煙樹杪雲埀玉枕屛山小夢欲成時驚覺了人心應不似伊心若解思歸歸合早又東風本是開花信及至花時風更緊吹開吹謝苦匆匆春意到頭無處問把酒臨風千萬恨欲掃殘紅猶未忍夜來風雨轉離披滿眼淒涼愁不盡又隂隂樹色籠晴晝清淡園林春過後杏腮輕粉日催紅池面緑羅風卷皺佳人向晚新粧就圓膩歌喉珠欲溜當筵莫放酒杯遲樂事良辰難入手又芙容鬭暈胭脂淺留著晚花開小宴畫船紅日晚風清栁色溪光晴照暖美人爭勸梨花盞舞困玉腰裙縷慢莫交銀燭促歸期巳祝斜陽休更晚南歌子鳯髻金泥帶龍紋玉掌梳走來窗下笑相扶愛道畫眉深淺入時無弄筆偎人久描花試手初等間妨了繡功夫笑問雙鴛鴦字怎生書御街行夭非華豔輕非霧來夜半天明去來如春夢不多時去似朝雲何處乳雞酒燕落星沉月紞紞城頭鼓參差漸辨西池樹朱閣斜欹戶緑苔深徑少人行苔上屐痕無數遺香餘粉􅓑衾間枕天把多情賦虞美人影梅梢弄粉香猶嫩欲寄江南春信别後寸腸縈損説與伊爭穩小爐獨守寒灰燼忍淚低頭畫盡眉上萬重新恨竟日無人問又鶯愁燕苦春歸去寂寂花飄紅雨碧草緑楊岐路況是長亭暮小年行客情難訴泣對東風無語目斷兩三煙樹翠隔江淹浦臨江仙栁外輕雷池上雨雨聲滴碎荷聲小樓西角斷虹明闌干倚處待得月華生燕子飛來窺畫棟玉鈎埀下簾旌涼波不動簟紋平水精雙枕傍有墮叉橫又記得金鑾同唱第春風上國繁華如今薄宦老天涯十年岐路空負曲江花聞説閬山通閬苑樓高不見君家孤城寒日等間斜離愁難盡紅樹遠連霞聖無憂世路風波險千年一别須臾人生聚散長如此相見且歡娛好酒能消光景春風不染髭鬚為公一醉花前倒紅袖莫來扶浪淘沙把酒祝東風且共從容埀楊紫陌洛城東總是當時攜手處遊遍芳叢聚散苦匆匆此恨無窮今年花勝去年紅可惜明年花更好知與誰同又花外倒金翹飲散無憀柔桑蔽日栁迷條此地年時曾一醉還是春朝今日舉輕橈帆影飄飄長亭回首短亭遙過盡長亭人更遠特地魂銷又五嶺麥秋殘荔子初丹絳紗囊裏水晶丸可惜天教生處遠不近長安往事憶開元妃子偏憐一從魂散馬嵬關只有紅塵迷驛使滿眼驪山又萬恨苦綿綿舊約前歡桃花溪畔栁隂間幾度日高春睡重繡戶深關樓外夕陽間獨自憑闌一重水隔一重山水闊山高人不見有淚無言又今日北池遊漾漾輕舟波光瀲灩栁條柔如此春來春又去白了人頭好妓好歌喉不醉難休勸君滿滿酌金甌總使花時常病酒也是風流定風波把酒花前欲問他對花何吝醉顏􅋳春到幾人能爛噴何況無情風雨等間多豔樹香叢都幾許朝暮惜紅愁粉奈情何好是金船浮玉浪相向十分深送一聲歌又把酒花前欲問伊忍嫌金盞負春時紅豔不能旬日看宜算須知開謝只相隨蝶去蝶來猶解戀難見回頭還是度年期莫候飲闌花巳盡方信無人堪與補殘枝又把酒花前欲問公對花何事訴金鐘為甚去年春甚處虛度鶯聲撩亂一場空今嵗春來須愛惜難得須知花靣不長紅待得酒醒君不見千片不隨流水即隨風又把酒花前欲問君世間何計可留春縱使青春留得住虛語無情花對有情人任是好花須落去自古紅顏能得幾時新暗想浮生何事好唯有清歌一曲倒金樽又過盡韶華不可添小樓紅日下層簷春睡覺來情緒惡寂寞楊花撩亂拂珠簾早是間愁依舊在無奈那堪更被宿醒兼把酒送春惆悵甚長恁年年三月病懨懨又對酒追歡莫負春春光歸去可饒人昨日紅芳今緑樹已暮殘花飛絮兩紛紛粉面麗姝歌窈窕清妙樽前信任醉醺醺不是狂心貪燕樂自覺年來白髮滿頭新驀山溪新正初破三五銀蟾滿纖手染香羅剪紅蓮滿城開遍樓臺上下歌管咽春風駕香輪停寶馬只待金烏晚帝城今夜羅綺誰為伴應卜紫姑神問歸期相思望斷天涯情緒對酒且開顏春宵短春寒淺莫待金杯暖浣溪沙雲曳香綿彩柱高絳旗風颭出花梢一梭紅帶往來拋束素美人羞不打却嫌裙慢褪纖腰日斜深院影空搖又堤上遊人逐畫船拍堤春水四埀天緑楊樓外出鞦韆白髮戴花君莫笑六么催拍盞頻傳人生何處似尊前又湖上朱橋響畫輪溶溶春水浸春雲碧琉璃滑淨無塵當路遊絲縈醉客隔花啼鳥喚行人日斜歸去奈何春又葉底青青杏子埀枝頭薄薄栁綿飛日高深院晚鶯啼堪恨風流成薄幸斷無消息道歸期托腮無語翠眉低又或入珠玉詞或入淮海詞青杏園林煮酒香佳人初試薄羅裳栁絲搖曳燕飛忙乍雨乍晴花自落間愁間悶晝偏長為誰消瘦損容光又紅粉佳人白玉杯朩蘭船穩棹歌催緑荷風裏笑聲來細雨輕煙籠草樹斜橋曲水繞樓臺夕陽高處畫屛開又翠袖嬌鬟舞石州兩行紅粉一時羞新聲難逐管絃愁白髮主人年未老清時賢相望偏優一尊風月為公留又燈燼埀花月似霜薄簾映月兩交光酒醺紅粉自生香雙手舞餘拖翠袖一聲歌巳釂金觴休回嬌眼斷人腸又十載相逢酒一巵故人才見便開眉老來遊舊更同誰浮世歌歡真易失宦途離合信難期尊前莫惜醉如泥御帶花青春何處風光好帝里偏愛元夕萬重繒綵搆一屛峰嶺半空金碧寶檠銀缸耀絳幕龍虎騰擲沙堤遠雕輪繡轂爭走五王宅雍容熙熙作晝會樂府神姬海洞仙客拽香搖翠稱執手行歌錦街天陌月淡寒輕漸向曉漏聲寂寂當年少狂心未巳不醉怎歸得虞美人爐香晝永龍煙白風動金鸞額畫屛寒掩小山川睡容初起枕痕圓墜花鈿樓高不及煙霄半望盡相思眼豔陽剛愛挫愁人故生芳草碧連雲怨王孫鶴沖天梅謝粉栁拖金香滿舊園林養花天氣半晴隂花好却愁深花無數愁無數花好却愁春去戴花持酒祝東風千萬莫匆匆夜行船憶昔西都歡縱自别後有誰能共伊川山水洛川花細尋思舊遊如夢記今日相逢情愈重愁聞唱畫樓鐘動白髮天涯逢此景倒金尊殢誰相送又滿眼東風飛絮催行色短亭春暮落花流水草連雲看看是斷腸南浦檀板未終人去去扁舟在緑楊深處手把金尊難為别更那聽亂鶯疏雨洛陽春紅紗未曉黃鸝語蕙爐銷蘭炷錦屛羅幕護春寒昨夜三更雨繡簾間倚吹輕絮斂眉山無緒看花拭淚向歸鴻問來處逢郎否一叢花向誤張子野傷春懷遠幾時窮無物似情濃離愁正恁牽絲亂更南陌飛絮濛濛歸騎漸遙征塵不斷何處認郎蹤雙鴛池沼水溶溶南北小橋通梯橫畫閣黃昏後又還是新月簾櫳沉恨細思不如桃李還解嫁春風雨中花千古都門行路能使離歌聲苦送盡行人花殘春晚又道君東去醉藉落花吹暖絮多少曲堤芳樹且攜手留連良辰美景留作相思處千秋嵗數聲鶗鴂又報芳菲歇惜春更把殘紅折雨輕風色暴梅子青時節永豐栁無人盡日花飛雪莫把絲絃撥怨極絃能説天不老情難絶心似雙絲網終有千千結夜過也東窗未白殘燈滅越溪春三月十三寒食日春色遍天涯越溪閬苑繁華地傍禁垣珠翠煙霞紅粉牆頭鞦韆影裏臨水人家歸來晚駐香車銀箭透窗紗有時三點兩點雨霽朱門栁細風斜沉麝不燒金鴨玲瓏月照梨花賀聖朝影白雪梨花紅粉桃露華高埀楊慢舞緑絲絛草如袍風過小池輕浪起似江臯千金莫惜買香醪且陶陶洞天春鶯啼緑樹聲早檻外殘紅未掃露點真珠遍芳草正簾幃清曉鞦韆宅院悄悄又是清明過了燕蝶輕狂栁絲撩亂春心多少憶漢月紅豔幾枝輕裊新被東風開了倚煙啼露為誰嬌故惹蝶憐蜂惱多情遊賞處留戀向緑叢千繞酒闌歡罷不成歸腸斷月斜春老清平樂雨晴煙晚緑水新池滿雙燕飛來埀栁院小閣畫簾高捲黃昏獨倚朱欄西南初月眉彎砌下落花風起羅衣特地春寒又小庭春老碧砌紅萱草長憶小闌間共繞攜手緑叢含笑别來音信全乖舊期前事堪猜門掩日斜人靜落花愁點青苔應天長舊刻三首考緑槐隂裏黃鸝語花間集刻韋莊今刪去一彎初月臨鸞鏡雲鬢鳯叉慵不整珠簾淨重樓迥惆悵落花風不定緑煙低栁徑何處轆轤金井昨夜更闌酒醒春愁勝却病又石城山下桃花綻宿雨初晴雲未散南去棹北飛雁水闊山遙腸欲斷倚樓情緒懶惆悵春心無限燕度蒹葭風晚欲歸愁滿面涼州令東堂石榴翠樹芳條颭的的裙腰初染佳人攜手弄芳菲緑隂紅影共展雙紋簟插花照影窺鸞鑑只恐芳容減不堪零落春晚青苔雨後深紅點一去門間掩重來却尋朱檻離離秋實弄輕霜嬌紅脈脈似見胭脂臉人非事往眉空斂誰把佳期賺芳心只願長依舊春風更放明年豔南鄉子翠密紅繁水國涼生未是寒雨打荷花珠不定輕翻泠潑鴛鴦錦翅斑盡日憑欄弄蕊拈花仔細看偷得裊蹄新鑄樣無端藏在紅房豔粉間又雨後斜陽細細風來細細香風定波平花映水休藏照出輕盈半面粧路隔秋江蓮子深深隱翠房意在蓮心無問處難忘淚裏紅腮不記行鵲橋仙月波清霽煙容明淡靈漢舊期還至鵲迎橋路接天津映夾岸星榆點綴雲屛未卷仙雞催曉腸斷去年情味多應天意不交長恁恐把歡娛容易芳草渡梧桐落蓼花秋煙初冷雨才收蕭條風物正堪愁人去後多少恨在心頭燕鴻遠羌笛怨渺渺澄波一片山如黛月如鈎笙歌散夢魂斷倚高樓珠簾捲珠簾捲暮雲愁埀楊暗鎖青樓煙雨濛濛如畫輕風吹旋收香斷錦屛新别人間玉簟初秋多少舊歡新恨書杳杳夢悠悠更漏子風帶寒枝正好蘭蕙無端先老情悄悄夢依依離人殊未歸褰羅幕憑朱閣不獨堪悲搖落月東出雁南飛誰家夜搗衣摸魚兒卷繡簾梧桐秋院落一霎雨添新緑對小池間立殘粧淺向晚水紋如縠凝遠目恨人去寂寂鳯枕孤難宿倚闌不足看燕拂風簷蝶翻露草兩兩長相逐雙眉促可惜年華婉娩西風初弄庭菊況伊家年少多情未巳難拘束那堪更趂涼景追尋甚處埀楊曲佳期過盡但不説歸來多應忘了雲屛去時祝少年遊去年秋晚此園中攜手玩芳叢拈花嗅蕊惱煙撩霧拚醉倚西風今年重對芳叢處追往事又成空敲遍闌干向人無語惆悵滿枝紅又肉紅圓樣淺心黃枝上巧如裝雨輕煙重無憀天氣啼破曉來粧寒輕貼體風頭冷忍拋棄向秋光不會深心為誰惆悵回面恨斜陽又玉壺氷瑩獸爐灰人起繡簾開春叢一夜六花開盡不待剪刀催洛陽城闕中天起高下遍樓臺絮亂風輕拂鞍霑袖歸路似章街行香子舞雪歌雲間淡粧勻藍溪水染輕裙酒香醺臉粉色生春更雅談話好情性美精神空江不斷淩波何處向越橋邊青栁朱門斷鐘殘角又送黃昏奈眼中淚心中事意中人鷓鴣天學畫宫眉細細長芙容出水鬭新粧只知一笑能傾國不信相看有斷腸雙黃鵠兩鴛鴦迢迢雲水恨難忘早知今日長相憶不及從初莫作雙六一詞
