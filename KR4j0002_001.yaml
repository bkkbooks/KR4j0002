body:
  text: 六一詞宋歐陽修撰採桑子輕舟短棹西湖好緑水逶迤芳草長堤隱隱笙歌處處隨無風水面琉璃滑不覺船移微動漣漪驚起沙禽掠岸飛又春深雨過西湖好百卉爭姸蝶亂蜂喧晴日催花暖欲然蘭橈畫舸悠悠去疑是神仙返照波間水闊風高揚管絃又畫船載酒西湖好急管繁絃玉盞催傳穩泛平波任醉眠行雲却在行舟下空水澄鮮俯仰留連疑是湖中别有天又羣芳過後西湖好狼籍殘紅飛絮濛濛埀栁闌干盡日風笙歌散盡遊人去始覺春空埀下簾櫳雙燕歸來細雨中又何人解賞西湖好佳景無時飛蓋相追貪向花間醉玉巵誰知間憑闌干處芳草斜暉水遠煙微一點滄洲白鷺飛又清明上巳西湖好滿目繁華爭道誰家緑栁朱輪走鈿車遊人日莫相將去醒醉喧譁路轉堤斜直到城頭總是花又荷花開後西湖好載酒來時不用旌旗前後紅幢緑蓋隨畫船撑入花深處香泛金巵煙雨微微一片笙歌醉裏歸又天容水色西湖好雲物俱鮮鷗鷺間眠應慣尋常聽管絃風清月白偏宜夜一片瓊田誰羡驂鸞人在舟中便是仙又殘霞夕照西湖好花塢蘋汀十頃波平野岸無人舟自橫西南月上浮雲散軒檻涼生蓮芰香清水面風來酒面醒又平生為愛西湖好來擁朱輪富貴浮雲俯仰流年二十春歸來恰似遼東鶴城郭人民觸目皆新誰識當年舊主人又畫樓鐘動君休唱往事無蹤聚散匆匆今日歡娛幾客同去年緑鬢今年白不覺衰容明月清風把酒何人憶謝公又十年一别流光速白首相逢莫話衰翁但鬭尊前語笑同勸君滿酌君須醉盡日從容畫鷁牽風即去朝天沃舜聰又十年前是樽前客月白風清憂患凋零老去光隂速可驚鬢華雖改心無改試把金觥舊曲重聽猶似當年醉裏聲朝中措平山堂平山闌檻倚晴空山色有無中手種堂前埀栁别來幾度春風文章太守揮毫萬字一飲千鍾行樂直須年少尊前看取衰翁歸自謡並載陽春録名歸國謡何處笛深夜夢回情脈脈竹風簷雨寒窗隔離人幾嵗無消息今頭白不眠特地重相憶又春豔豔江上晚山三四點栁絲如剪花如染香閨寂寂門半掩愁眉斂淚珠滴破胭脂臉又寒水碧水上何人吹玉笛扁舟逺送瀟湘客蘆花千里霜月白傷行色來朝便是關山隔長相思舊刻四首考深畫眉淺畫眉一首花間集刻白樂天尊前集刻唐無名氏今刪去蘋滿溪柳繞堤相送行人溪水西回時隴月低煙霏霏風淒淒重倚朱門聽馬嘶寒鷗相對飛又花似伊栁似伊花栁青春人别離低頭雙淚埀長江東長江西兩岸鴛鴦兩處飛相逢知幾時又深花枝淺花枝深淺花枝相並時花枝難似伊玉如肌栁如眉愛著鵝黃金縷衣啼粧更為誰訴衷情或刻山谷但清晨簾幕作珠簾繡幕易成傷作恨難忘擬歌作未歌清晨簾幕卷輕霜呵手試梅粧都緣自有離恨故畫作遠山長思往事惜流芳易成傷擬歌先斂欲笑還顰最斷人腸踏莎行候館梅殘溪橋栁細草熏風暖搖征轡離愁漸逺漸無窮迢迢不斷如春水寸寸柔腸盈盈粉淚樓高莫近危闌倚平蕪盡處是春山行人更在春山外又雨霽風光春分天氣千花百卉爭明媚畫梁新燕一雙雙玉籠鸚鵡愁孤睡薜荔依牆莓苔滿地青樓幾處歌聲麗驀然舊事上心來無言斂皺眉山翠望江南江南蝶斜日一雙雙身似何郎全傅粉心如韓壽愛偷香天賦與輕狂微雨後薄翅膩煙光才伴遊蜂來小院又隨飛絮過東牆長是為花忙減字木蘭花留春不住燕老鶯慵無覓處説似殘春一老應無却少人風和月好辦得黃金須買笑愛惜芳時莫待無花空折枝又傷懷離抱天若有情天亦老此意如何細似輕絲渺似波扁舟岸側楓葉荻花秋索索細想前歡須著人間比夢間又樓臺向曉淡月低雲天氣好翠幕風微宛轉梁州入破時香生舞袂楚女腰肢天與細汗粉重勻酒後輕寒不著人又畫堂雅宴一抹朱絃初入遍慢撚輕籠玉指纖纖嫩剝蔥撥頭憁利怨月愁花無限意紅粉輕盈倚暖香檀曲未成又歌檀斂袂繚繞雕梁塵暗起柔潤清圓百琲明珠一線穿櫻唇玉齒天上仙音心下事留住行雲滿坐迷魂酒半醺生查子或刻秦少遊去年元夜時花市燈如晝月到栁梢頭人約黃昏後今年元夜時月與燈依舊不見去年人淚滿春衫袖又或刻張子野含羞整翠鬟得意頻相顧雁柱十三絃一一春鶯語嬌雲容易飛夢斷知何處深院鎖黃昏陳陳芭蕉雨瑞鷓鴣楚王臺上一神仙眼色相看意已傳見了又休還似夢坐來雖近遠如天隴禽有恨猶能説江月無情也解圓更被春風送惆悵落花飛絮兩翩翩阮郎歸東風臨水日銜山春來長是間落花狼籍酒闌珊笙歌醉夢間春睡覺晚粧殘無人整翠鬟留連光景惜朱顏黃昏獨倚闌又或刻晏同叔南園春早踏青時風和聞馬嘶青梅如豆栁如眉日長蝴蝶飛花露重草煙低人家簾幕埀鞦韆慵困解羅衣畫梁雙燕棲又上三闋並載陽春集名醉桃源角聲吹斷隴梅枝孤窗月影低塞鴻無限欲驚飛城烏休夜啼尋斷夢掩深閨行人去路迷門前楊栁緑隂齊何時聞馬嘶又劉郎何日是來時無心雲勝伊行雲猶解傍山扉郎行去不歸強勻畫又芳菲春深輕薄衣桃花無語伴相思隂隂月上時又落花浮水樹臨池年前心眼期見來無事去還思而今花又飛淺螺黛淡燕脂間粧取次宜隔簾風雨閉門時此情風月知蝶戀花舊刻二十二首考遙夜亭臯間信步是李中主作六曲闌干偎碧樹又簾幕風輕雙語燕俱見珠玉詞獨倚危樓風細細又簾下清歌簾外宴俱見樂章集今俱刪去簾幕東風寒料峭雪裏梅香先報春來早紅蠟枝頭雙燕小金刀剪綵呈纖巧旋暖金爐熏蕙藻酒入橫波困不禁煩惱繡被五更春睡好羅幃不覺紗窗曉又南雁依稀回側陳雪霽牆隂遍覺蘭芽嫩中夜夢餘消酒困爐香卷穗燈生暈急景流年都一瞬往事前歡未免縈方寸臘後花期知漸近東風已作寒梅信又臘雪初消梅蕊綻梅雪相和喜鵲穿花囀睡起夕陽迷醉眼新愁長向東風亂瘦覺玉肌羅帶緩紅杏梢頭二月春猶淺望極不來芳信斷音書縱有爭如見又海燕雙來歸畫棟簾影無風花影頻移動半醉騰騰春睡重緑鬟堆枕香雲擁翠被雙盤金縷鳯憶得前春有箇人人共花裏黃鶯時一弄日斜驚起相思夢又回旋落花風蕩漾栁重煙深雪絮飛來往雨後輕寒猶未放春愁酒病成惆悵枕畔屛山圍碧浪翠被華燈夜夜空相向寂寞起來褰繡幌月明正在梨花上又一見陽春録易安李氏稱是六一詞庭院深深深幾許楊栁堆煙簾幕無重數玉勒雕鞍遊冶處樓高不見章臺路雨橫風狂三月暮門掩黃昏無計留春住淚眼問花花不語亂紅飛過鞦韆去又永日環隄乘綵舫煙草蕭疏恰似晴江上水浸碧天風皺浪菱花荇蔓隨雙槳紅粉佳人翻麗唱驚起鴛鴦兩兩飛相向且把金尊傾美釀休思往事成惆悵又越女採蓮秋水畔窄袖輕羅暗露雙金釧照影摘花花似面芳心只共絲爭亂鸂鷘灘頭風浪晚霧重煙輕不見來時伴隱隱歌聲歸棹遠離愁引著江南岸又水浸秋天風皺浪縹眇仙舟只似秋天上和露採蓮愁一餉看花却是啼粧樣折得蓮莖絲未放蓮斷絲牽特地成惆悵歸棹莫愁花蕩漾江頭有箇人相望又一刻同叔一刻子瞻梨葉初紅蟬韻歇銀漢風高玉管聲凄切枕簟乍涼銅漏徹誰教社燕輕離别草際蟲吟秋露結宿酒醒來不記歸時節多少衷腸猶未説珠簾夜夜朦朧月又亦載陽春録誰道間情拋棄久每到春來惆悵還依舊日日花前常病酒不辭鏡裏朱顏瘦河畔青蕪堤上栁為問新愁何事年年有獨立小橋風滿袖平林新月人歸後又翠苑紅芳晴滿目綺席流鶯上下長相逐紫陌間隨金轣轆馬蹄踏遍春郊緑一覺年華春夢促往事悠悠百種尋思足煙雨滿樓山斷續人間倚遍闌干曲又小院深深門掩亞寂莫珠簾畫閣重重下欲近禁煙微雨罷緑楊深處鞦韆挂傅粉狂遊猶未捨不念芳時眉黛無人畫薄幸未歸春去也杏花零落香紅謝又亦載陽春録幾日行雲何處去忘了歸來不道春將莫百草千花寒食路香車繫在誰家樹淚眼倚樓頻獨語雙燕來時陌上相逢否撩亂春愁如栁絮依依夢裏無尋處又欲過清明煙雨細小檻臨窗點點殘花墜梁燕語多驚曉睡銀屛一半堆香被新嵗風光如舊嵗所恨征輪漸漸程迢遞縱有遠情難寫寄何妨解有相思淚又畫閣歸來春又晚燕子雙飛栁軟桃花淺細雨滿天風滿院愁眉斂盡無人見獨倚闌干心緒亂芳草芊綿尚憶江南岸風月無情人暗換舊遊如夢空腸斷又嘗愛西湖春色早臘雪方銷巳見桃開小頃刻光隂都過了如今緑暗紅英少且趂餘花謀一笑況有笙歌豔態相縈繞老去風情應不到憑君􅓑把芳尊倒漁家傲舊刻三十二首考幽鷺謾來窺品格又楚國細腰元自瘦俱晏元獻公作今刪去一𣲖潺湲流碧漲新亭四面山相向翠竹嶺頭明月上迷俯仰月輪正在泉中漾更待高秋天氣爽菊花香裏開新釀酒美賓嘉真勝賞紅粉唱山深分外歌聲響又十月小春梅蕊綻紅爐畫閣新裝遍錦帳美人貪睡暖羞起晚玉壺一夜氷澌滿樓上四埀簾不卷天寒山色偏宜遠風急雁行吹字斷紅日短江天雪意雲撩亂又與趙康靖公四紀才名天下重三朝構厦為梁棟定册功成身退勇辭榮寵歸來白首笙歌擁顧我薄才無可用君恩近許歸田壠今日一觴難得共聊對捧官奴為我高歌送又暖日遲遲花裊裊人將紅粉爭花好花不能言惟解笑金壺倒花開未老人年少車馬九門來擾擾行人莫羡長安道丹禁漏聲衢鼓報催昏曉長安城裏人先老又紅粉牆頭花幾樹落花片片和驚絮牆外有樓花有主尋花去隔牆遙見鞦韆侣緑索紅旗雙彩柱行人只得偷回顧腸斷樓南金鎖戶天欲莫流鶯飛到鞦韆處又妾本錢塘蘇小妹芙容花共門相對昨日為逢青傘蓋慵不採今朝斗覺凋零晒愁倚畫樓無計奈亂紅飄過秋塘外料得明年秋色在香可愛其如鏡裏花顏改又花底忽聞敲兩槳逡巡女伴來尋訪酒盞旋將荷葉當蓮舟蕩時時盞裏生紅浪花氣酒香清厮釀花腮酒面紅相向醉倚緑隂眠一餉驚起望船頭閣在沙灘上又葉有清風花有露葉籠花罩鴛鴦侣白錦頂絲紅錦羽蓮女妬驚飛不許長相聚日腳沉紅天色莫清涼傘上微微雨早是水寒無宿處須回步枉教雨裏分飛去又荷葉田田青照水孤舟挽在花隂底昨夜蕭蕭疏雨墜愁不寐朝來又覺西風起雨擺風搖金蕊碎合歡枝上香房翠蓮子與人長厮類無好意年年苦在中心裏又葉重如將青玉亞花輕疑是紅綃挂顏色清新香脫灑堪長價牡丹怎得稱王者雨筆露箋勻彩畫日爐風炭熏蘭麝天與多情絲一把誰厮惹千條萬縷縈心下又一刻同叔粉蕊丹青描不得金針線線功難敵誰傍暗香輕採摘風淅淅船頭觸散雙鸂鷘夜雨染成天水碧朝陽借出胭脂色欲落又開人共惜秋氣逼盤中巳見新荷菂又喜鵲填河仙浪淺雲軿早在星橋畔街鼓黃昏霞尾暗炎光斂金鈎側倒天西面一别經年今始見新歡往恨知何限天上佳期貪眷戀良宵短人間不合催銀箭又乞巧樓頭雲幔卷浮花催洗嚴粧面花上蛛絲尋得遍顰笑淺雙眸望月牽紅線奕奕天河光不斷有人正在長生殿暗付金叉清夜半千秋願年年此會長相見又别恨長長歡計短疏鐘促漏真堪怨此會此情都未半星初轉鸞琴鳯樂匆匆卷河鼓無言西北眄香蛾有恨東南遠脈脈橫波珠淚滿歸心亂離腸便逐星橋斷又九日歡遊何處好黃花萬蕊雕欄繞通體清香無俗調天氣好煙滋露結功多少日腳清寒高下照寶釘密綴圓斜小落葉西園風嫋嫋催秋老叢邊莫厭金樽倒又青女霜前催得綻金鈿亂散枝頭遍落帽臺高開雅宴芳尊滿挼花吹在流霞面桃李三春雖可羡鶯來蝶去芳心亂爭似仙潭秋水岸香不斷年年自作茱茰伴又露裛嬌黃風擺